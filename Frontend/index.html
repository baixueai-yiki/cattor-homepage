<!-- 标签 属性 = 值 -->

<!DOCTYPE html><!-- 使用html5标准 -->
<html lang="zh-CN"><!-- html的根标签，属性：lang="zh-CN"中文 -->

<head><!-- 网页标题，使用UTF-8编码 -->
    <meta charset="UTF-8">
    <title>苹果网</title>
    <link rel="icon" href="images/apple1.png"><!--连接外部资源 关系=图标 文件地址=images/apple.png-->
    <link rel="stylesheet" href="style.css"><!--连接外部资源 关系=样式表 地址=MessageBoard.css -->
</head>

<body><!-- 网页主体 -->

<h1>留言板</h1><!-- 一级标题 -->
<div class="board"><!--区域 类="board" -->
    <input id="nameInput" placeholder="你的名字"><!--创建输入框 id="nameInput" 提示文本="你的名字" -->
    <textarea id="messageInput" placeholder="写点什么...">
    </textarea><!--多行输入框 id="messageInput" 提示文本="写点什么..." -->
    <button id="submitBtn" type="button"><!--按钮 id="submitBtn" 标签="button"-->
        留言
    </button>
    <div id="messageList"><!--区域 id="messageList"邮件列表 -->

    </div><!--区域结束 id="messageList" -->
</div><!--区域结束 名字="board" -->

<script src="script.js"></script><!-- 执行js 来源=script.js -->
</body><!-- 网页主体 -->
</html><!-- html的根标签，属性：lang="zh-CN"中文 -->
